apiVersion: milvus.io/v1beta1
kind: Milvus
metadata:
  name: milvus-experiment
  labels:
    app.kubernetes.io/instance: milvus
spec:
  mode: cluster
  dependencies:
    etcd:
      inCluster:
        values:
          replicaCount: 1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
    pulsar:
      inCluster:
        values:
          components:
            autorecovery: false
          bookkeeper:
            replicaCount: 1
          broker:
            replicaCount: 1
          zookeeper:
            replicaCount: 1
  components:
    proxy:
      replicas: 1
    queryNode:
      replicas: 1
    indexNode:
      replicas: 1
    dataNode:
      replicas: 1
